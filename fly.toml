app = "eat-cook-enjoy"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[processes]
  web    = "node apps/web/.next/standalone/apps/web/server.js"
  worker = "node apps/whatsapp-worker/dist/index.js"

[env]
  NODE_ENV = "production"
  TZ = "Asia/Jerusalem"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  WORKER_HEALTH_PORT = "8080"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["web", "worker"]

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["web"]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/api/health"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["worker"]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
